version: "1.0"
status: "ACTIVE"
last_updated: "2026-03-07"

source_policy:
  allowed_modes:
    - pinned_git_commit
    - local_snapshot_with_commit
  forbidden_modes:
    - floating_main
    - sibling_checkout_as_only_truth
    - unpinned_archive

startup_order:
  - art_core
  - art_agent
  - regart_backend
  - regart_ui_proxy
  - regart_browser_level0

planes:
  - id: os_plane
    sources:
      - art_agent
      - systemd
      - journald
      - proc_probe
      - net_probe
  - id: backend_plane
    sources:
      - regart_ui_proxy
      - langgraph_runtime
      - upstream_error
  - id: browser_plane
    sources:
      - browser_level0
      - network_provider
      - ui_runtime

suites:
  - id: art-regart-smoke
    stages: ["05", "06", "20", "24", "38"]
    required_planes: ["os_plane", "backend_plane", "browser_plane"]
    required_evidence:
      - regart_pinned_source_manifest
      - regart_smoke_log
  - id: art-regart-hostile-bridge
    stages: ["05", "06", "24", "38"]
    required_planes: ["backend_plane", "browser_plane"]
    required_evidence:
      - regart_hostile_bridge_log
      - regart_backlog_recovery_log
  - id: art-regart-replay
    stages: ["05", "06", "20", "24", "38"]
    required_planes: ["backend_plane", "browser_plane"]
    required_evidence:
      - regart_replay_log
  - id: art-regart-long-chain
    stages: ["05", "06", "20", "24", "38"]
    required_planes: ["os_plane", "backend_plane", "browser_plane"]
    required_evidence:
      - regart_long_chain_log
  - id: art-regart-actions-audit
    stages: ["06", "20", "24", "38"]
    required_planes: ["backend_plane"]
    required_evidence:
      - regart_actions_audit_log

required_documents:
  - docs/source/regart_adversarial_integration_harness_v0_2.md
  - docs/source/checklists/CHECKLIST_05_REGART_UI_GRAPH_RUN_DEBUGGER.md
  - docs/source/checklists/CHECKLIST_06_REGART_ART_BRIDGE.md
  - docs/source/checklists/CHECKLIST_20_PACK_REGART.md
  - docs/source/checklists/CHECKLIST_24_RELEASE_UPGRADE_REGRESSION.md
  - docs/source/checklists/CHECKLIST_38_STAGE_LADDER_ENFORCEMENT.md
