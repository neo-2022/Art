version: "1.0"
master_checklist: "docs/source/checklists/CHECKLIST_00_MASTER_ART_REGART.md"

notes:
  - "Each documentation file must map to at least one checklist and therefore to CHECKLIST_00."
  - "Patterns are evaluated top-to-bottom; first match is used for ownership traceability reports."

mappings:
  - pattern: "README.md"
    checklist: "docs/source/checklists/CHECKLIST_00_MASTER_ART_REGART.md"
  - pattern: "SECURITY.md"
    checklist: "docs/source/checklists/CHECKLIST_04 _Secure SDLC + Supply-chain.md"
  - pattern: "docs/README.md"
    checklist: "docs/source/checklists/CHECKLIST_07_ART_REPO_CI_DOCS.md"

  - pattern: "docs/source/checklists/CHECKLIST_*.md"
    checklist: "docs/source/checklists/CHECKLIST_00_MASTER_ART_REGART.md"
  - pattern: "docs/source/regart_adversarial_integration_harness_v0_2.md"
    checklist: "docs/source/checklists/CHECKLIST_06_REGART_ART_BRIDGE.md"
  - pattern: "docs/source/*.md"
    checklist: "docs/source/checklists/CHECKLIST_00_MASTER_ART_REGART.md"

  - pattern: "docs/ARCHITECTURE.md"
    checklist: "docs/source/checklists/CHECKLIST_07_ART_REPO_CI_DOCS.md"
  - pattern: "docs/INTEGRATION.md"
    checklist: "docs/source/checklists/CHECKLIST_06_REGART_ART_BRIDGE.md"

  - pattern: "docs/agent/*.md"
    checklist: "docs/source/checklists/CHECKLIST_17_ART_AGENT_SPOOL_OUTBOX.md"
  - pattern: "docs/browser/*.md"
    checklist: "docs/source/checklists/CHECKLIST_10_ART_BROWSER_LEVEL0_UNIVERSAL.md"
  - pattern: "docs/compliance/*.md"
    checklist: "docs/source/checklists/CHECKLIST_25_COMPLIANCE_AUDIT_READY.md"
  - pattern: "docs/contracts/**/*.md"
    checklist: "docs/source/checklists/CHECKLIST_08_ART_CONTRACTS_OPENAPI_CODEGEN.md"
  - pattern: "docs/en/**/*.md"
    checklist: "docs/source/checklists/CHECKLIST_28_CONSOLE_FOUNDATION_MONOREPO.md"
  - pattern: "docs/foundation/*.md"
    checklist: "docs/source/checklists/CHECKLIST_28_CONSOLE_FOUNDATION_MONOREPO.md"
  - pattern: "docs/governance/*.md"
    checklist: "docs/source/checklists/CHECKLIST_01_GOVERNANCE_SRE.md"
  - pattern: "docs/ops/*.md"
    checklist: "docs/source/checklists/CHECKLIST_23_OPS_DEPLOY_RUNBOOKS_DR.md"
  - pattern: "docs/packs/**/*.md"
    checklist: "docs/source/checklists/CHECKLIST_19_PACKS_FRAMEWORK.md"
  - pattern: "docs/portal/**/*.md"
    checklist: "docs/source/checklists/CHECKLIST_28_CONSOLE_FOUNDATION_MONOREPO.md"
  - pattern: "docs/privacy/*.md"
    checklist: "docs/source/checklists/CHECKLIST_02_PRIVACY_BASELINE_GLOBAL.md"
  - pattern: "docs/rag/*.md"
    checklist: "docs/source/checklists/CHECKLIST_28_CONSOLE_FOUNDATION_MONOREPO.md"
  - pattern: "docs/release/*.md"
    checklist: "docs/source/checklists/CHECKLIST_24_RELEASE_UPGRADE_REGRESSION.md"
  - pattern: "docs/runbooks/*.md"
    checklist: "docs/source/checklists/CHECKLIST_23_OPS_DEPLOY_RUNBOOKS_DR.md"
  - pattern: "docs/security/**/*"
    checklist: "docs/source/checklists/CHECKLIST_04 _Secure SDLC + Supply-chain.md"
  - pattern: "docs/telemetry/*.md"
    checklist: "docs/source/checklists/CHECKLIST_09_TELEMETRY_OTEL_OTLP.md"

  - pattern: "docs/**/*.md"
    checklist: "docs/source/checklists/CHECKLIST_00_MASTER_ART_REGART.md"
