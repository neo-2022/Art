version: 1
entries:
  - id: RUSTSEC-2025-0134
    package: rustls-pemfile
    path: Cargo.lock
    disposition: temporary-risk-accept
    reason: >
      Транзитивная зависимость через axum-server TLS bootstrap. Уязвимость помечает crate
      как unmaintained; в текущем baseline нет доступного patch-level апдейта в lockfile.
      Runtime exploit не заявлен, но зависимость должна быть удалена из production path.
    mitigation:
      - migration target: rustls-pki-types::pem::PemObject
      - owning_stage: CHECKLIST_04 + CHECKLIST_23
      - required_follow_up: заменить axum-server TLS bootstrap или исключить rustls-pemfile из dependency tree
    expires_utc: 2026-04-15T00:00:00Z
    owner: neo-2022
