<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Art Panel0</title>
    <link rel="icon" href="/panel0/favicon.ico">
    <link rel="stylesheet" href="/panel0/panel0.css">
  </head>
  <body>
    <header class="top">
      <div>
        <h1 data-i18n="panel0.title">Art Panel0</h1>
        <p class="muted" data-i18n="panel0.subtitle">Embedded emergency panel for Core</p>
      </div>
      <div class="diag">
        <div><span class="muted" data-i18n="panel0.build_id_label">build_id:</span> <span id="build-id">dev</span></div>
        <div><span class="muted" data-i18n="panel0.profile_id_label">effective_profile_id:</span> <span id="profile-id">unknown</span></div>
        <div class="lang-switch">
          <span class="muted" data-i18n="panel0.language_label">Language:</span>
          <button id="lang-en" type="button" data-locale="en" data-i18n-title="panel0.switch_language" title="Switch language">EN</button>
          <button id="lang-ru" type="button" data-locale="ru" data-i18n-title="panel0.switch_language" title="Сменить язык">RU</button>
        </div>
      </div>
    </header>

    <section id="core-down" class="core-down hidden">
      <h2 data-i18n="panel0.core_down_title">Core is unavailable</h2>
      <p id="core-down-reason">network error</p>
      <button id="reload-btn" type="button" data-i18n="panel0.reload" data-i18n-title="panel0.reload_tooltip" title="Reload panel state">Reload</button>
    </section>

    <section class="events">
      <h2 data-i18n="panel0.events_title">Events</h2>
      <ul id="events-list"></ul>
    </section>

    <section class="evidence" id="panel0-evidence">
      <h2 data-i18n="panel0.evidence_title">Evidence payload</h2>
      <pre id="evidence-json" class="mono muted">{}</pre>
    </section>

    <script defer src="/panel0/panel0.js"></script>
  </body>
</html>
