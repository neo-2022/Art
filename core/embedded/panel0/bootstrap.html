<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Art bootstrap</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        max-width: 560px;
        padding: 20px;
        border: 1px solid #334155;
        border-radius: 12px;
        background: #111827;
      }
      .muted {
        color: #94a3b8;
        font-size: 13px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 style="margin-top: 0;">Art Console bootstrap</h1>
      <p>Проверяем доступность основной консоли. При сбое будет открыт Panel0.</p>
      <p class="muted">Dev hotkey: <span class="mono">Ctrl+Shift+P</span> открывает Panel0 принудительно.</p>
      <p class="muted mono" id="boot-status">status: probing console...</p>
      <p class="muted mono" id="boot-meta"></p>
    </div>
    <script>
      (() => {
        const CONSOLE_BASE_PATH = __CONSOLE_BASE_PATH_JSON__;
        const PANEL0_BUILD_ID = __PANEL0_BUILD_ID_JSON__;
        const BOOT_TIMEOUT_MS = __BOOT_TIMEOUT_MS__;
        const BACKLOG_KEY = "art.panel0.console_boot_failed.backlog.v1";
        const BACKLOG_MAX = 64;
        const EVENT_KIND = "observability_gap.console_boot_failed";
        const statusEl = document.getElementById("boot-status");
        const metaEl = document.getElementById("boot-meta");
        let finished = false;

        addEventListener("keydown", (event) => {
          if (event.ctrlKey && event.shiftKey && String(event.key || "").toLowerCase() === "p") {
            event.preventDefault();
            globalThis.location.assign("/panel0");
          }
        });

        const nowMs = () => Date.now();
        const updateStatus = (text) => {
          if (statusEl) {
            statusEl.textContent = `status: ${text}`;
          }
        };

        const randomTraceId = () => {
          if (globalThis.crypto && typeof globalThis.crypto.randomUUID === "function") {
            return globalThis.crypto.randomUUID();
          }
          return `trace-${nowMs()}-${Math.random().toString(16).slice(2, 10)}`;
        };

        const normalizeEvidence = ({
          reasonType,
          url,
          httpStatus,
          errorText,
          timeoutMs,
          traceId,
        }) => ({
          reason_type: String(reasonType || "network_error"),
          url: String(url || CONSOLE_BASE_PATH),
          http_status: Number.isFinite(httpStatus) ? Number(httpStatus) : null,
          error_text: String(errorText || ""),
          timeout_ms: Number.isFinite(timeoutMs) ? Number(timeoutMs) : null,
          build_id: String(PANEL0_BUILD_ID || "dev"),
          effective_profile_id: "unknown",
          trace_id: String(traceId || randomTraceId()),
        });

        const loadBacklog = () => {
          try {
            const raw = globalThis.localStorage?.getItem(BACKLOG_KEY);
            if (!raw) {
              return [];
            }
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const saveBacklog = (events) => {
          const trimmed = events.slice(-BACKLOG_MAX);
          try {
            globalThis.localStorage?.setItem(BACKLOG_KEY, JSON.stringify(trimmed));
          } catch {
            // ignore localStorage failures
          }
        };

        const buildEvent = (evidence) => ({
          kind: EVENT_KIND,
          severity: "error",
          msg: "Console bootstrap failed, switched to Panel0",
          ts_ms: nowMs(),
          trace_id: evidence.trace_id,
          details: evidence,
          action_ref: "docs/runbooks/console_boot_failed.md",
        });

        const postIngest = async (events) => {
          const resp = await fetch("/api/v1/ingest", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ events }),
            cache: "no-store",
          });
          if (!resp.ok) {
            throw new Error(`ingest_status_${resp.status}`);
          }
          return resp;
        };

        const flushBacklog = async () => {
          const backlog = loadBacklog();
          if (!backlog.length) {
            return;
          }
          try {
            await postIngest(backlog);
            saveBacklog([]);
          } catch {
            saveBacklog(backlog);
          }
        };

        const fallbackToPanel0 = async (reasonType, details) => {
          if (finished) {
            return;
          }
          finished = true;
          const evidence = normalizeEvidence({
            reasonType,
            url: details.url,
            httpStatus: details.httpStatus,
            errorText: details.errorText,
            timeoutMs: details.timeoutMs,
            traceId: details.traceId,
          });
          const event = buildEvent(evidence);
          const backlog = loadBacklog();
          backlog.push(event);
          saveBacklog(backlog);
          updateStatus(`fallback: ${reasonType}`);
          if (metaEl) {
            metaEl.textContent = JSON.stringify(evidence);
          }
          try {
            await flushBacklog();
          } finally {
            globalThis.location.replace("/panel0");
          }
        };

        const timeoutHandle = setTimeout(() => {
          fallbackToPanel0("timeout", {
            url: CONSOLE_BASE_PATH,
            timeoutMs: BOOT_TIMEOUT_MS,
            errorText: "console did not become available within timeout",
            traceId: randomTraceId(),
          });
        }, BOOT_TIMEOUT_MS);

        const runtimeCrashHandler = (event) => {
          const message = event?.message || event?.reason?.message || String(event?.reason || "runtime crash");
          fallbackToPanel0("runtime_crash", {
            url: CONSOLE_BASE_PATH,
            errorText: String(message),
            traceId: randomTraceId(),
          });
        };
        addEventListener("error", runtimeCrashHandler);
        addEventListener("unhandledrejection", runtimeCrashHandler);

        (async () => {
          try {
            const resp = await fetch(CONSOLE_BASE_PATH, { cache: "no-store" });
            if (finished) {
              return;
            }
            if (!resp.ok) {
              clearTimeout(timeoutHandle);
              await fallbackToPanel0("http_error", {
                url: CONSOLE_BASE_PATH,
                httpStatus: resp.status,
                errorText: `http_status_${resp.status}`,
                traceId: randomTraceId(),
              });
              return;
            }
            clearTimeout(timeoutHandle);
            finished = true;
            updateStatus("console available, redirecting");
            globalThis.location.replace(CONSOLE_BASE_PATH);
          } catch (error) {
            clearTimeout(timeoutHandle);
            await fallbackToPanel0("network_error", {
              url: CONSOLE_BASE_PATH,
              errorText: String(error?.message || error || "network error"),
              traceId: randomTraceId(),
            });
          }
        })();
      })();
    </script>
  </body>
</html>
